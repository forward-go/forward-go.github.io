    <h1 class="article-title" itemprop="name">
      扁平字典转换为嵌套字典
    </h1>
  

      </header>
    
    <div class="article-entry" itemprop="articleBody">
      
        <h2 id="题目"><a href="#题目" class="headerlink" title="题目"></a>题目</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"> Given a “flatten” dictionary object, whose keys are dot-separated. For example, &#123; ‘A’: 1, ‘B.A’: 2, ‘B.B’: 3, ‘CC.D.E’: 4, ‘CC.D.F’: 5&#125;. Implement a function to transform it to a “nested” dictionary object. In the above case, the nested version is like:</span><br><span class="line">&#123;</span><br><span class="line">  ‘A’: 1,</span><br><span class="line">  ‘B’: &#123;</span><br><span class="line">    ‘A’: 2,</span><br><span class="line">    ‘B’: 3</span><br><span class="line">  &#125;,</span><br><span class="line">  ‘CC’: &#123;</span><br><span class="line">    ‘D’: &#123;</span><br><span class="line">      ‘E’: 4,</span><br><span class="line">      ‘F’: 5</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h2 id="解答"><a href="#解答" class="headerlink" title="解答"></a>解答</h2><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> flattentonested;</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> java.util.HashMap;</span><br><span class="line"><span class="keyword">import</span> java.util.Map;</span><br><span class="line"></span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">FattenToNested</span> </span>&#123;</span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">main</span><span class="params">(String[] args)</span> </span>&#123;</span><br><span class="line">        Map&lt;String, Object&gt; map = <span class="keyword">new</span> HashMap&lt;&gt;();</span><br><span class="line">        map.put(<span class="string">"A"</span>,<span class="number">1</span>);</span><br><span class="line">        map.put(<span class="string">"B.A"</span>,<span class="number">2</span>);</span><br><span class="line">        map.put(<span class="string">"B.B"</span>,<span class="number">3</span>);</span><br><span class="line">        map.put(<span class="string">"CC.D.E"</span>,<span class="number">4</span>);</span><br><span class="line">        map.put(<span class="string">"CC.D.F"</span>,<span class="number">5</span>);</span><br><span class="line">        Map nested = flattenToNested(map);</span><br><span class="line">        System.out.println(nested.toString());</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">static</span> Map <span class="title">flattenToNested</span><span class="params">(Map&lt;String,Object&gt; fatten)</span></span>&#123;</span><br><span class="line">        Map&lt;String, Object&gt; nested = <span class="keyword">new</span> HashMap();</span><br><span class="line">        <span class="keyword">for</span> (Map.Entry&lt;String,Object&gt; entry : fatten.entrySet()) &#123;</span><br><span class="line">            String key = entry.getKey();</span><br><span class="line">            String[] strings = key.split(<span class="string">"\\."</span>);</span><br><span class="line">            <span class="keyword">if</span>(strings.length == <span class="number">1</span>)&#123;</span><br><span class="line">                nested.put(key,entry.getValue());</span><br><span class="line">            &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">                <span class="comment">//如果字典已存在，则不新建Map对象</span></span><br><span class="line">                <span class="keyword">if</span>(nested.get(strings[<span class="number">0</span>]) == <span class="keyword">null</span>) &#123;</span><br><span class="line">                    nested.put(strings[<span class="number">0</span>], <span class="keyword">new</span> HashMap&lt;String, Object&gt;());</span><br><span class="line">                &#125;</span><br><span class="line">                Map now = nested;</span><br><span class="line">                <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">1</span>; i &lt; strings.length-<span class="number">1</span>; i++) &#123;</span><br><span class="line">                    now = (Map&lt;String, Object&gt;)now.get(strings[i - <span class="number">1</span>]);</span><br><span class="line">                    <span class="comment">//如果字典已存在，则不新建Map对象</span></span><br><span class="line">                    <span class="keyword">if</span>(now.get(strings[i]) == <span class="keyword">null</span>) &#123;</span><br><span class="line">                        now.put(strings[i], <span class="keyword">new</span> HashMap&lt;String, Object&gt;());</span><br><span class="line">                    &#125;</span><br><span class="line">                &#125;</span><br><span class="line">                now = (Map&lt;String, Object&gt;)now.get(strings[strings.length - <span class="number">2</span>]);</span><br><span class="line">                now.put(strings[strings.length-<span class="number">1</span>],entry.getValue());</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> nested;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
